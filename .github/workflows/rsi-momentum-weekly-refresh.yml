name: RSI Momentum Weekly Refresh

# Runs at 3:40 PM IST (10:10 UTC) every Friday after market close.
on:
  schedule:
    - cron: '10 10 * * 5'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run RSI Momentum Refresh Job
        env:
          RENDER_SERVICE_URL: ${{ secrets.RENDER_SERVICE_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          mvn -pl cron-job -am install -DskipTests --no-transfer-progress
          mvn -pl cron-job exec:java -Dexec.mainClass=com.tradingtool.cron.RsiMomentumRefreshJobKt --no-transfer-progress
