name: Delivery Reconciliation Daily

# Runs daily at 9:00 PM IST (15:30 UTC).
# IST = UTC+5:30, so 9:00 PM IST = 15:30 UTC.
on:
  schedule:
    - cron: '30 15 * * *'
  workflow_dispatch:

jobs:
  reconcile:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run DeliveryReconciliationJob
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          KITE_API_KEY: ${{ secrets.KITE_API_KEY }}
          KITE_API_SECRET: ${{ secrets.KITE_API_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          mvn -pl cron-job -am install -DskipTests --no-transfer-progress
          mvn -pl cron-job exec:java -Dexec.mainClass=com.tradingtool.cron.DeliveryReconciliationJobKt --no-transfer-progress
