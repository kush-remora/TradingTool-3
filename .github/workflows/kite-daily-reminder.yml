name: Kite Daily Login Reminder

# Runs at 10:30 AM IST (05:00 UTC) on weekdays only.
# IST = UTC+5:30, so 10:30 AM IST = 05:00 UTC.
# Markets are closed on weekends — no login needed Sat/Sun.
on:
  schedule:
    - cron: '0 5 * * 1-5'
  workflow_dispatch: # allow manual trigger from GitHub UI for testing

jobs:
  remind:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run KiteReminderJob
        env:
          KITE_API_KEY: ${{ secrets.KITE_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RENDER_SERVICE_URL: ${{ secrets.RENDER_SERVICE_URL }}
        # Install local module dependencies first, then execute only in cron-job module.
        run: |
          mvn -pl cron-job -am install -DskipTests --no-transfer-progress
          mvn -pl cron-job exec:java -Dexec.mainClass=com.tradingtool.cron.KiteReminderJobKt --no-transfer-progress
