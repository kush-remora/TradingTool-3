name: Index Constituent Weekly Sync

# Runs weekly on Sunday at 7:00 AM IST (01:30 UTC).
on:
  schedule:
    - cron: '30 1 * * 0'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run IndexConstituentSyncJob
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          KITE_API_KEY: ${{ secrets.KITE_API_KEY }}
          KITE_API_SECRET: ${{ secrets.KITE_API_SECRET }}
        run: |
          mvn -pl cron-job -am install -DskipTests --no-transfer-progress
          mvn -pl cron-job exec:java -Dexec.mainClass=com.tradingtool.cron.IndexConstituentSyncJobKt --no-transfer-progress
